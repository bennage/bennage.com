<body>

  <main>
    <section class="slideshow" aria-label="Family Photos">

          <div class="slide-frame">

        <figure class="slide slide--bounce">
          <div class="slide-frame">

        </figure>

        <figure class="slide slide--flip">
          <div class="slide-frame">
            <img src="images/RRS9554.JPG" alt="The Bennage family on a couch with cats, reading Chief Architect">

          <figcaption>Totally candid, not staged at all</figcaption>
        </figure>

        <figure class="slide slide--wobble">

      <!-- Drifting text overlay -->
      <div class="drift-layer" aria-hidden="true">
        <span class="drift drift--1">bennage.com</span>
        <span class="drift drift--2">bennage.com</span>
