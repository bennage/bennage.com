<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Bennages — A Perfectly Normal Family</title>
  <meta name="description" content="The official and very serious website of the Bennage family.">

  <!-- Open Graph -->
  <meta property="og:title" content="The Bennages">
  <meta property="og:description" content="A perfectly normal family. Nothing to see here.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://bennage.com">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="hero">
    <div class="hero-content">
      <h1 class="hero-title">
        <span class="hero-the">The</span>
        <span class="hero-name">Bennages</span>
      </h1>
      <p class="hero-tagline">A perfectly normal family. Nothing to see here.</p>
    </div>
  </header>

  <main>
    <section class="gallery" aria-label="Family Photos">
      <h2 class="sr-only">Family Photos</h2>

      <div class="gallery-grid">

        <figure class="photo photo--wide">
          <div class="photo-frame">
            <img src="images/placeholder-1.svg" alt="Family photo — replace with your own" loading="lazy">
          </div>
          <figcaption>Exhibit A</figcaption>
        </figure>

        <figure class="photo photo--tall">
          <div class="photo-frame">
            <img src="images/placeholder-2.svg" alt="Family photo — replace with your own" loading="lazy">
          </div>
          <figcaption>No comment</figcaption>
        </figure>

        <figure class="photo">
          <div class="photo-frame">
            <img src="images/placeholder-3.svg" alt="Family photo — replace with your own" loading="lazy">
          </div>
          <figcaption>We meant to do that</figcaption>
        </figure>

        <figure class="photo">
          <div class="photo-frame">
            <img src="images/placeholder-4.svg" alt="Family photo — replace with your own" loading="lazy">
          </div>
          <figcaption>Totally candid</figcaption>
        </figure>

        <figure class="photo photo--wide">
          <div class="photo-frame">
            <img src="images/placeholder-5.svg" alt="Family photo — replace with your own" loading="lazy">
          </div>
          <figcaption>Our lawyer says we can't explain this one</figcaption>
        </figure>

        <figure class="photo photo--tall">
          <div class="photo-frame">
            <img src="images/placeholder-6.svg" alt="Family photo — replace with your own" loading="lazy">
          </div>
          <figcaption>Peak performance</figcaption>
        </figure>

      </div>
    </section>

    <section class="fun-facts">
      <h2>Vital Statistics</h2>
      <ul class="facts-list">
        <li>🏠 Members: <strong>Yes</strong></li>
        <li>🐾 Pets: <strong>Probably too many</strong></li>
        <li>🍕 Pizza opinions: <strong>Strong</strong></li>
        <li>📸 Embarrassing photos: <strong>This page</strong></li>
      </ul>
    </section>
  </main>

  <footer class="site-footer">
    <p>&copy; The Bennage Family Industrial Complex</p>
    <p class="footer-small">Est. whenever · bennage.com</p>
  </footer>

</body>
</html>
